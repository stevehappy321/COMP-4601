<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Store</title>

  <style>
    .panel { 
      background: #fff;
      padding: 15px; 
      border-radius: 8px; 
      max-width: 500px; 
      margin: 20px 0; 
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15); 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
    }

    .dimension-inputs { 
      display: flex; 
      gap: 10px; 
    }

    .dimension-inputs label {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .dimension-inputs input {
      width: 100%;
      min-width: 0;
    }

    body {
      font-family: monospace, sans-serif;
      margin: 0;
      padding: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #f0f0f0;
      font-weight: bold;
    }

    td.price {
      font-weight: bold;
    }

    button {
      padding: 6px 10px;
      cursor: pointer;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    .price-slider {
      display: inline-block;
      width: 20ch;
      text-align: right;
    }
  </style>
</head>
<body>

  <script src="catalogue.js"></script>

  <h1>Online Store</h1>

  <div id="filter" class="panel">
    <input type="text" id="searchInput" placeholder="Search by name" />
    <label>
      <input type="checkbox" id="inStock" checked/> In stock only
    </label> 
    <div class="dimension-inputs">
      <label> X <input type="number" id="dimX" min="0" /></label> 
      <label> Y <input type="number" id="dimY" min="0" /></label>
      <label> Z <input type="number" id="dimZ" min="0" /></label>
    </div>
    <label>
      Max price: <span id="price_value" style="display:inline-block; width:4ch; text-align:right;">500</span>
      <input class="price-slider" type="range" id="maxPrice" min="0" max="1000" value="1000" />
    </label>
  </div>

  <form id="newProduct" class="panel">
    <h2>New Product</h2>
    <label>
      Name <input type="text" data-type="name"/> 
    </label>
    <label>
      Price <input type="number" data-type="price" /> 
    </label>
    <label>
      Stock <input type="number" data-type="stock" /> 
    </label>
        
    <label> X <input type="number" data-type="dimX" min="0" /></label> 
    <label> Y <input type="number" data-type="dimY" min="0" /></label>
    <label> Z <input type="number" data-type="dimZ" min="0" /></label>
    <button type="submit">Create</button>
  </form>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Price</th>
          <th>X</th>
          <th>Y</th>
          <th>Z</th>
          <th>In Stock</th>
          <th>Cart</th>
        </tr>
      </thead>
      <tbody id="storeBody">
        
      </tbody>
    </table>
  </div>

  <script>
    const maxPriceSlider = document.querySelector("#maxPrice");
    const priceValue = document.querySelector("#price_value");

    if (maxPriceSlider && priceValue) {
      priceValue.textContent = maxPriceSlider.value;

      maxPriceSlider.addEventListener("input", () => {
        priceValue.textContent = maxPriceSlider.value;
      });
    }
  </script>

</body>
</html>
